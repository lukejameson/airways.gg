name: Build & Deploy

on:
  push:
    branches:
      - main
      - test
      - production
  pull_request:
    branches:
      - main
      - test

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/lukejameson/airways.gg

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web:               ${{ steps.changes.outputs.web }}
      guernsey_scraper:  ${{ steps.changes.outputs.guernsey_scraper }}
      fr24_scraper:      ${{ steps.changes.outputs.fr24_scraper }}
      adsb_service:      ${{ steps.changes.outputs.adsb_service }}
      position_service:  ${{ steps.changes.outputs.position_service }}
      weather_service:   ${{ steps.changes.outputs.weather_service }}
      ml_service:        ${{ steps.changes.outputs.ml_service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/database/**'
              - 'package*.json'
            guernsey_scraper:
              - 'apps/guernsey-scraper/**'
              - 'packages/database/**'
              - 'package*.json'
            fr24_scraper:
              - 'apps/fr24-scraper/**'
              - 'packages/database/**'
              - 'package*.json'
            adsb_service:
              - 'apps/adsb-service/**'
              - 'packages/database/**'
              - 'package*.json'
            position_service:
              - 'apps/position-service/**'
              - 'packages/database/**'
              - 'package*.json'
            weather_service:
              - 'apps/weather-service/**'
              - 'packages/database/**'
              - 'package*.json'
            ml_service:
              - 'apps/ml-service/**'

  build-and-push:
    needs: [detect-changes]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push web app
        if: needs.detect-changes.outputs.web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/app:${{ github.ref_name }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build & push guernsey-scraper
        if: needs.detect-changes.outputs.guernsey_scraper == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/guernsey-scraper/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/guernsey-scraper:${{ github.ref_name }}
          cache-from: type=gha,scope=guernsey-scraper
          cache-to: type=gha,mode=max,scope=guernsey-scraper

      - name: Build & push fr24-scraper
        if: needs.detect-changes.outputs.fr24_scraper == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/fr24-scraper/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/fr24-scraper:${{ github.ref_name }}
          cache-from: type=gha,scope=fr24-scraper
          cache-to: type=gha,mode=max,scope=fr24-scraper

      - name: Build & push adsb-service
        if: needs.detect-changes.outputs.adsb_service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/adsb-service/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/adsb-service:${{ github.ref_name }}
          cache-from: type=gha,scope=adsb-service
          cache-to: type=gha,mode=max,scope=adsb-service

      - name: Build & push position-service
        if: needs.detect-changes.outputs.position_service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/position-service/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/position-service:${{ github.ref_name }}
          cache-from: type=gha,scope=position-service
          cache-to: type=gha,mode=max,scope=position-service

      - name: Build & push weather-service
        if: needs.detect-changes.outputs.weather_service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/weather-service/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/weather-service:${{ github.ref_name }}
          cache-from: type=gha,scope=weather-service
          cache-to: type=gha,mode=max,scope=weather-service

      - name: Build & push ml-service
        if: needs.detect-changes.outputs.ml_service == 'true'
        uses: docker/build-push-action@v6
        with:
          context: apps/ml-service
          file: apps/ml-service/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/ml-service:${{ github.ref_name }}
          cache-from: type=gha,scope=ml-service
          cache-to: type=gha,mode=max,scope=ml-service

      - name: Notify Telegram (Build Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *Build Failed* — `${{ github.repository }}`
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy to DEV  (push to main)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    needs: [detect-changes, build-and-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Compute changed services
        id: services
        run: |
          SERVICES=""
          [ "${{ needs.detect-changes.outputs.web }}"              = "true" ] && SERVICES="$SERVICES app"
          [ "${{ needs.detect-changes.outputs.guernsey_scraper }}" = "true" ] && SERVICES="$SERVICES guernsey-scraper"
          [ "${{ needs.detect-changes.outputs.fr24_scraper }}"     = "true" ] && SERVICES="$SERVICES fr24-scraper"
          [ "${{ needs.detect-changes.outputs.adsb_service }}"     = "true" ] && SERVICES="$SERVICES adsb-service"
          [ "${{ needs.detect-changes.outputs.position_service }}" = "true" ] && SERVICES="$SERVICES position-service"
          [ "${{ needs.detect-changes.outputs.weather_service }}"  = "true" ] && SERVICES="$SERVICES weather-service"
          [ "${{ needs.detect-changes.outputs.ml_service }}"       = "true" ] && SERVICES="$SERVICES ml-service"
          echo "list=$(echo $SERVICES | xargs || echo 'none')" >> $GITHUB_OUTPUT

      - name: Deploy changed services to dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          envs: CHANGED_WEB,CHANGED_GUERNSEY_SCRAPER,CHANGED_FR24_SCRAPER,CHANGED_ADSB_SERVICE,CHANGED_POSITION_SERVICE,CHANGED_WEATHER_SERVICE,CHANGED_ML_SERVICE
          script: |
            set -e
            cd /opt/airways.gg-dev

            git fetch origin
            git checkout main
            git pull origin main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            COMPOSE="docker compose -f docker-compose.dev.yml --env-file .env.dev"
            PREFIX="ghcr.io/lukejameson/airways.gg"
            TAG="main"

            SERVICES=""
            [ "$CHANGED_WEB"               = "true" ] && docker pull $PREFIX/app:$TAG               && SERVICES="$SERVICES app"
            [ "$CHANGED_GUERNSEY_SCRAPER"  = "true" ] && docker pull $PREFIX/guernsey-scraper:$TAG  && SERVICES="$SERVICES guernsey-live"
            [ "$CHANGED_FR24_SCRAPER"      = "true" ] && docker pull $PREFIX/fr24-scraper:$TAG      && SERVICES="$SERVICES fr24-scraper"
            [ "$CHANGED_ADSB_SERVICE"      = "true" ] && docker pull $PREFIX/adsb-service:$TAG      && SERVICES="$SERVICES adsb-service"
            [ "$CHANGED_POSITION_SERVICE"  = "true" ] && docker pull $PREFIX/position-service:$TAG  && SERVICES="$SERVICES position-service"
            [ "$CHANGED_WEATHER_SERVICE"   = "true" ] && docker pull $PREFIX/weather-service:$TAG   && SERVICES="$SERVICES weather-service"
            [ "$CHANGED_ML_SERVICE"        = "true" ] && docker pull $PREFIX/ml-service:$TAG        && SERVICES="$SERVICES ml-service"

            if [ -z "$(echo $SERVICES | tr -d ' ')" ]; then
              echo "No service changes detected — skipping deploy."
            else
              echo "Deploying: $SERVICES"
              $COMPOSE up -d --no-deps $SERVICES
            fi

            docker image prune -af --filter "until=24h"
            docker system df
        env:
          CHANGED_WEB:              ${{ needs.detect-changes.outputs.web }}
          CHANGED_GUERNSEY_SCRAPER: ${{ needs.detect-changes.outputs.guernsey_scraper }}
          CHANGED_FR24_SCRAPER:     ${{ needs.detect-changes.outputs.fr24_scraper }}
          CHANGED_ADSB_SERVICE:     ${{ needs.detect-changes.outputs.adsb_service }}
          CHANGED_POSITION_SERVICE: ${{ needs.detect-changes.outputs.position_service }}
          CHANGED_WEATHER_SERVICE:  ${{ needs.detect-changes.outputs.weather_service }}
          CHANGED_ML_SERVICE:       ${{ needs.detect-changes.outputs.ml_service }}

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *Dev* Airways.gg`
            Services: `${{ steps.services.outputs.list }}`
            Message: ${{ github.event.commits[0].message }`
            Commit: `${{ github.sha }}

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *Dev Deploy Failed* — `${{ github.repository }}`
            Services: `${{ steps.services.outputs.list }}`
            Message: ${{ github.event.commits[0].message }`
            Commit: `${{ github.sha }}

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy to TEST  (push to test)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-test:
    needs: [detect-changes, build-and-push]
    if: github.ref == 'refs/heads/test' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Compute changed services
        id: services
        run: |
          SERVICES=""
          [ "${{ needs.detect-changes.outputs.web }}"              = "true" ] && SERVICES="$SERVICES app"
          [ "${{ needs.detect-changes.outputs.guernsey_scraper }}" = "true" ] && SERVICES="$SERVICES guernsey-scraper"
          [ "${{ needs.detect-changes.outputs.fr24_scraper }}"     = "true" ] && SERVICES="$SERVICES fr24-scraper"
          [ "${{ needs.detect-changes.outputs.adsb_service }}"     = "true" ] && SERVICES="$SERVICES adsb-service"
          [ "${{ needs.detect-changes.outputs.position_service }}" = "true" ] && SERVICES="$SERVICES position-service"
          [ "${{ needs.detect-changes.outputs.weather_service }}"  = "true" ] && SERVICES="$SERVICES weather-service"
          [ "${{ needs.detect-changes.outputs.ml_service }}"       = "true" ] && SERVICES="$SERVICES ml-service"
          echo "list=$(echo $SERVICES | xargs || echo 'none')" >> $GITHUB_OUTPUT

      - name: Deploy changed services to test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          envs: CHANGED_WEB,CHANGED_GUERNSEY_SCRAPER,CHANGED_FR24_SCRAPER,CHANGED_ADSB_SERVICE,CHANGED_POSITION_SERVICE,CHANGED_WEATHER_SERVICE,CHANGED_ML_SERVICE
          script: |
            set -e
            cd /opt/airways.gg-test

            git fetch origin
            git checkout test
            git pull origin test

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            COMPOSE="docker compose -f docker-compose.test.yml --env-file .env.test"
            PREFIX="ghcr.io/lukejameson/airways.gg"
            TAG="test"

            SERVICES=""
            [ "$CHANGED_WEB"               = "true" ] && docker pull $PREFIX/app:$TAG               && SERVICES="$SERVICES app"
            [ "$CHANGED_GUERNSEY_SCRAPER"  = "true" ] && docker pull $PREFIX/guernsey-scraper:$TAG  && SERVICES="$SERVICES guernsey-live"
            [ "$CHANGED_FR24_SCRAPER"      = "true" ] && docker pull $PREFIX/fr24-scraper:$TAG      && SERVICES="$SERVICES fr24-scraper"
            [ "$CHANGED_ADSB_SERVICE"      = "true" ] && docker pull $PREFIX/adsb-service:$TAG      && SERVICES="$SERVICES adsb-service"
            [ "$CHANGED_POSITION_SERVICE"  = "true" ] && docker pull $PREFIX/position-service:$TAG  && SERVICES="$SERVICES position-service"
            [ "$CHANGED_WEATHER_SERVICE"   = "true" ] && docker pull $PREFIX/weather-service:$TAG   && SERVICES="$SERVICES weather-service"
            [ "$CHANGED_ML_SERVICE"        = "true" ] && docker pull $PREFIX/ml-service:$TAG        && SERVICES="$SERVICES ml-service"

            if [ -z "$(echo $SERVICES | tr -d ' ')" ]; then
              echo "No service changes detected — skipping deploy."
            else
              echo "Deploying: $SERVICES"
              $COMPOSE up -d --no-deps $SERVICES
            fi

            docker image prune -af --filter "until=24h"
            docker system df
        env:
          CHANGED_WEB:              ${{ needs.detect-changes.outputs.web }}
          CHANGED_GUERNSEY_SCRAPER: ${{ needs.detect-changes.outputs.guernsey_scraper }}
          CHANGED_FR24_SCRAPER:     ${{ needs.detect-changes.outputs.fr24_scraper }}
          CHANGED_ADSB_SERVICE:     ${{ needs.detect-changes.outputs.adsb_service }}
          CHANGED_POSITION_SERVICE: ${{ needs.detect-changes.outputs.position_service }}
          CHANGED_WEATHER_SERVICE:  ${{ needs.detect-changes.outputs.weather_service }}
          CHANGED_ML_SERVICE:       ${{ needs.detect-changes.outputs.ml_service }}

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ *Test* Airways.gg`
            Services: `${{ steps.services.outputs.list }}`
            Message: ${{ github.event.commits[0].message }`
            Commit: `${{ github.sha }}

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ *Test Deploy Failed* — `${{ github.repository }}`
            Services: `${{ steps.services.outputs.list }}`
            Message: ${{ github.event.commits[0].message }`
            Commit: `${{ github.sha }}

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy to PRODUCTION  (push to production)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-production:
    needs: [detect-changes, build-and-push]
    if: github.ref == 'refs/heads/production' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Compute changed services
        id: services
        run: |
          SERVICES=""
          [ "${{ needs.detect-changes.outputs.web }}"              = "true" ] && SERVICES="$SERVICES app"
          [ "${{ needs.detect-changes.outputs.guernsey_scraper }}" = "true" ] && SERVICES="$SERVICES guernsey-scraper"
          [ "${{ needs.detect-changes.outputs.fr24_scraper }}"     = "true" ] && SERVICES="$SERVICES fr24-scraper"
          [ "${{ needs.detect-changes.outputs.adsb_service }}"     = "true" ] && SERVICES="$SERVICES adsb-service"
          [ "${{ needs.detect-changes.outputs.position_service }}" = "true" ] && SERVICES="$SERVICES position-service"
          [ "${{ needs.detect-changes.outputs.weather_service }}"  = "true" ] && SERVICES="$SERVICES weather-service"
          [ "${{ needs.detect-changes.outputs.ml_service }}"       = "true" ] && SERVICES="$SERVICES ml-service"
          echo "list=$(echo $SERVICES | xargs || echo 'none')" >> $GITHUB_OUTPUT

      - name: Deploy changed services to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          envs: CHANGED_WEB,CHANGED_GUERNSEY_SCRAPER,CHANGED_FR24_SCRAPER,CHANGED_ADSB_SERVICE,CHANGED_POSITION_SERVICE,CHANGED_WEATHER_SERVICE,CHANGED_ML_SERVICE
          script: |
            set -e
            cd /opt/airways.gg

            git fetch origin
            git checkout production
            git pull origin production

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env"
            PREFIX="ghcr.io/lukejameson/airways.gg"
            TAG="production"

            SERVICES=""
            [ "$CHANGED_WEB"               = "true" ] && docker pull $PREFIX/app:$TAG               && SERVICES="$SERVICES app"
            [ "$CHANGED_GUERNSEY_SCRAPER"  = "true" ] && docker pull $PREFIX/guernsey-scraper:$TAG  && SERVICES="$SERVICES guernsey-live"
            [ "$CHANGED_FR24_SCRAPER"      = "true" ] && docker pull $PREFIX/fr24-scraper:$TAG      && SERVICES="$SERVICES fr24-scraper"
            [ "$CHANGED_ADSB_SERVICE"      = "true" ] && docker pull $PREFIX/adsb-service:$TAG      && SERVICES="$SERVICES adsb-service"
            [ "$CHANGED_POSITION_SERVICE"  = "true" ] && docker pull $PREFIX/position-service:$TAG  && SERVICES="$SERVICES position-service"
            [ "$CHANGED_WEATHER_SERVICE"   = "true" ] && docker pull $PREFIX/weather-service:$TAG   && SERVICES="$SERVICES weather-service"
            [ "$CHANGED_ML_SERVICE"        = "true" ] && docker pull $PREFIX/ml-service:$TAG        && SERVICES="$SERVICES ml-service"

            if [ -z "$(echo $SERVICES | tr -d ' ')" ]; then
              echo "No service changes detected — skipping deploy."
            else
              echo "Deploying: $SERVICES"
              $COMPOSE up -d --no-deps $SERVICES
            fi

            docker image prune -af --filter "until=24h"
            docker system df
        env:
          CHANGED_WEB:              ${{ needs.detect-changes.outputs.web }}
          CHANGED_GUERNSEY_SCRAPER: ${{ needs.detect-changes.outputs.guernsey_scraper }}
          CHANGED_FR24_SCRAPER:     ${{ needs.detect-changes.outputs.fr24_scraper }}
          CHANGED_ADSB_SERVICE:     ${{ needs.detect-changes.outputs.adsb_service }}
          CHANGED_POSITION_SERVICE: ${{ needs.detect-changes.outputs.position_service }}
          CHANGED_WEATHER_SERVICE:  ${{ needs.detect-changes.outputs.weather_service }}
          CHANGED_ML_SERVICE:       ${{ needs.detect-changes.outputs.ml_service }}

      - name: Notify Telegram (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚀 *Production* Airways.gg`
            Services: `${{ steps.services.outputs.list }}`
            Message: ${{ github.event.commits[0].message }`
            Commit: `${{ github.sha }}

      - name: Notify Telegram (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🔥 *Production Deploy FAILED* — `${{ github.repository }}`
            Services: `${{ steps.services.outputs.list }}`
            Message: ${{ github.event.commits[0].message }`
            Commit: `${{ github.sha }}
