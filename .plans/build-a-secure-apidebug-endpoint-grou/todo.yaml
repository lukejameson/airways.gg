notes:
  - users and sessions tables are excluded from debug API (password_hash, session tokens)
  - Table endpoints default limit=100, capped at 1000
  - Raw SQL endpoint capped at 30s query timeout
  - Response format: { rows, count, queryMs } for all endpoints
  - Stats mirror imports query functions from routes/stats/lib/queries.ts — no duplication
  - Token from $env/dynamic/private (never exposed to client)
  - hooks.server.ts check scoped to pathname.startsWith('/api/debug/')

