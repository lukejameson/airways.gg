# todo.yaml — single source of truth for LLM
# Updated: 2026-06-01T00:00:00Z

goal: >
  Fix 4 timezone bugs causing flights to display 1 hour early/late, as
  identified in research-brief.md.

why_how: >
  The codebase has a long history of toggling between timeZone: 'UTC' and
  timeZone: 'Europe/London' in display format functions, combined with a
  migration (0014) that converted BST wall-clock timestamps to true UTC.
  The scrapers now correctly store UTC, and the pg driver reads UTC — but
  the frontend is inconsistent: the FlightCard correctly uses
  Europe/London, while the flight detail page and stats page still use
  UTC or extract raw UTC hours. Some historical data may also be
  corrupted by migration ping-pong. All fixes are surgical — mostly
  1-3 line changes in specific files.

expected: >
  All times display correctly as Guernsey local (Europe/London) across
  the flight board, flight detail page, and stats page. Historical
  actual_departure/actual_arrival times are verified and fixed where
  needed. A shared format helper prevents future regressions.

status: complete

tasks:
  - phase: 1
    name: Fix Display Bugs
    status: done
    items:
      - done: true
        action: Fix flight detail page — change timeZone: 'UTC' to timeZone: 'Europe/London' in formatTime, formatDateTime, and shortDate in apps/web/src/routes/flights/[id]/+page.svelte
      - done: true
        action: Fix stats departure hour chart — change EXTRACT(HOUR FROM f.scheduled_departure) to EXTRACT(HOUR FROM f.scheduled_departure AT TIME ZONE 'Europe/London') in the departureHour query in apps/web/src/routes/stats/+page.server.ts

  - phase: 2
