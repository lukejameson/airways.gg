        action: Rewrite FlightMap.svelte — replace Leaflet API (L.map, L.tileLayer, L.polyline, L.marker, L.divIcon, L.latLngBounds, fitBounds) with MapLibre GL equivalents (maplibregl.Map, addSource+addLayer for lines, maplibregl.Marker, fitBounds with bbox computation). Import maplibre-gl CSS. Keep same props interface, h-72 size, and collapsible behavior.

  - phase: 3
