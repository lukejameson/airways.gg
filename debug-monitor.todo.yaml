# Context: debug-monitor.research-brief.md — Health Monitor Service

goal: >
  Build a 24/7 health monitoring service (apps/health-monitor) that runs
  SQL-based integrity checks against the airways.gg database every hour,
  passes results through DeepSeek V4 Flash every 2 hours for cross-signal
  correlation, and sends structured Telegram summaries when issues are found.

why_how: >
  Six services (guernsey, fr24, adsb, position, weather, notification) each
  alert on their own failures but no service correlates across them. A
  shared-infrastructure outage would produce 3+ unconnected alerts. This
  service uses two-tier checking: Tier 1 runs 14+ parameterized SQL checks
  every hour (scraper health, flight data integrity, notification pipeline,
  weather/position gaps). Tier 2 feeds check results + sample rows to
  DeepSeek V4 Flash every 2 hours with a prompt tuned to spot multi-signal
  patterns ("3 scrapers + weather + position all failed within 10min →
  possible network outage"). Findings aggregate into one structured Telegram
  message per cycle — silent when healthy. All queries are read-only and use
  indexed columns. DB-only (no web app HTTP checks). LLM runs strictly on
  the 2-hour schedule, never triggered early. Same TELEGRAM_CHAT_ID as other
  services. Periodic "all clear" heartbeat to Telegram for self-monitoring.

expected: >
  - apps/health-monitor/ service following the same pattern as all existing
    services (loadEnv → main → setInterval loop → sendAlert)
  - Tier 1: 14+ SQL health checks across 4 categories running every hour
  - Tier 2: DeepSeek V4 Flash analysis every 2 hours with cross-signal
    correlation prompt
  - Structured Telegram summary per cycle (silent when all checks pass),
    plus a periodic heartbeat to confirm the monitor itself is alive
  - Dockerized alongside other services in docker-compose
  - Unit tests for each check function and LLM prompt formatting

