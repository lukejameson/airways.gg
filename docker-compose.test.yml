# Test environment
# Usage: docker compose -f docker-compose.test.yml --env-file .env.test up -d

services:
  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=production
      - ADDRESS_HEADER=CF-Connecting-IP
      - BODY_SIZE_LIMIT=10M
      - ML_SERVICE_URL=http://ml-service:8000
      - SESSION_SECRET=${SESSION_SECRET}
      - DOMAIN=${DOMAIN:?DOMAIN is required}
      - ORIGIN=https://${DOMAIN:?DOMAIN is required}
      - PUBLIC_BUY_ME_A_COFFEE_URL=${PUBLIC_BUY_ME_A_COFFEE_URL}
      - PUBLIC_FORMSPREE_URL=${PUBLIC_FORMSPREE_URL}
      - PUBLIC_UMAMI_WEBSITE_ID=${PUBLIC_UMAMI_WEBSITE_ID}
      - PUBLIC_UMAMI_URL=${PUBLIC_UMAMI_URL}
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.airwaysgg-test.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.airwaysgg-test.entrypoints=websecure'
      - 'traefik.http.routers.airwaysgg-test.tls=true'
      - 'traefik.http.routers.airwaysgg-test.tls.certresolver=letsencrypt'
      - 'traefik.http.services.airwaysgg-test.loadbalancer.server.port=3000'
    depends_on:
      - ml-service
    networks:
      - web
    restart: unless-stopped

  guernsey-live:
    build:
      context: .
      dockerfile: apps/guernsey-scraper/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SCRAPER_MODE=live
      - GUERNSEY_AIRPORT_URL=${GUERNSEY_AIRPORT_URL:-https://www.airport.gg}
      - SCRAPER_CUTOFF_HOUR=${SCRAPER_CUTOFF_HOUR:-23}
      - SCRAPER_WAKE_OFFSET_MINS=${SCRAPER_WAKE_OFFSET_MINS:-30}
      - SCRAPER_INTERVAL_HIGH_MINS=${SCRAPER_INTERVAL_HIGH_MINS:-2}
      - SCRAPER_INTERVAL_MEDIUM_MINS=${SCRAPER_INTERVAL_MEDIUM_MINS:-5}
      - SCRAPER_INTERVAL_LOW_MINS=${SCRAPER_INTERVAL_LOW_MINS:-10}
      - SCRAPER_INTERVAL_IDLE_MINS=${SCRAPER_INTERVAL_IDLE_MINS:-15}
      - SCRAPER_INTERVAL_TOMORROW_MINS=${SCRAPER_INTERVAL_TOMORROW_MINS:-360}
      - NODE_ENV=production
    networks:
      - web
    restart: unless-stopped

  fr24-scraper:
    build:
      context: .
      dockerfile: apps/fr24-scraper/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SCRAPER_CUTOFF_HOUR=${SCRAPER_CUTOFF_HOUR:-23}
      - SCRAPER_WAKE_OFFSET_MINS=${SCRAPER_WAKE_OFFSET_MINS:-30}
      - SCRAPER_INTERVAL_HIGH_MINS=${SCRAPER_INTERVAL_HIGH_MINS:-2}
      - SCRAPER_INTERVAL_MEDIUM_MINS=${SCRAPER_INTERVAL_MEDIUM_MINS:-5}
      - SCRAPER_INTERVAL_LOW_MINS=${SCRAPER_INTERVAL_LOW_MINS:-10}
      - SCRAPER_INTERVAL_IDLE_MINS=${SCRAPER_INTERVAL_IDLE_MINS:-15}
      - SCRAPER_MAX_RETRIES=${SCRAPER_MAX_RETRIES:-3}
      - PROXY_ENABLED=${PROXY_ENABLED:-false}
      - PROXY_USERNAME=${PROXY_USERNAME}
      - PROXY_PASSWORD=${PROXY_PASSWORD}
      - PROXY_HOSTS=${PROXY_HOSTS}
      - NODE_ENV=production
    networks:
      - web
    restart: unless-stopped

  adsb-service:
    build:
      context: .
      dockerfile: apps/adsb-service/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ADSB_INTERVAL_MS=${ADSB_INTERVAL_MS:-60000}
      - NODE_ENV=production
    networks:
      - web
    restart: unless-stopped

  guernsey-backfill:
    build:
      context: .
      dockerfile: apps/guernsey-scraper/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SCRAPER_MODE=backfill
      - BACKFILL_START_DATE=${BACKFILL_START_DATE:-2019-01-01}
      - BACKFILL_END_DATE=${BACKFILL_END_DATE}
      - GUERNSEY_AIRPORT_URL=${GUERNSEY_AIRPORT_URL:-https://www.airport.gg}
      - NODE_ENV=production
    networks:
      - web
    restart: on-failure
    profiles:
      - backfill

  position-service:
    build:
      context: .
      dockerfile: apps/position-service/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - FR24_API_TOKEN=${FR24_API_TOKEN}
      - POSITION_INTERVAL_MS=${POSITION_INTERVAL_MS:-300000}
      - NODE_ENV=production
    networks:
      - web
    restart: unless-stopped

  weather-service:
    build:
      context: .
      dockerfile: apps/weather-service/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENMETEO_API_URL=${OPENMETEO_API_URL:-https://api.open-meteo.com/v1/forecast}
      - NODE_ENV=production
    networks:
      - web
    restart: unless-stopped

  ml-service:
    build:
      context: apps/ml-service
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MODEL_PATH=/app/models
    volumes:
      - ml-models-test:/app/models
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    external: true

volumes:
  ml-models-test:
