# todo.yaml — single source of truth for LLM
# Updated: 2026-06-03T09:36:00Z

goal: >
  Fix systemic 1-hour offset in all flight scheduled departure/arrival times
  caused by Luxon failing to resolve the Europe/London timezone on Alpine
  Docker images during BST.

why_how: >
  Every flight displays scheduled times 1 hour later than reality during BST
  (e.g., GR634 shows 10:15 instead of 09:15). The root cause is that
  localToUtc() uses Luxon's DateTime.fromFormat with zone:'Europe/London',
  but the node:20-alpine Docker images lack tzdata, causing Luxon to fall
  back to UTC and store times as-if-UTC instead of true UTC. The display
  layer (formatGuernseyTime) uses native Intl.DateTimeFormat which resolves
  the timezone correctly, converting the wrongly-stored UTC value back to
  BST as BST+1 — producing the 1-hour offset.

  Fix: install tzdata in guernsey-scraper and web Dockerfiles so Luxon can
  resolve Europe/London. Then run a SQL migration to correct already-stored
  bad data (add 1 hour to scheduled times for BST dates). Add an integration
  test to prevent regression.

expected: >
  After deployment, all flight scheduled departure/arrival times display
  correctly in BST (09:15 instead of 10:15 for GR634). The fix is durable:
  tzdata installed in affected containers, regression test in place, and
  existing bad data corrected via migration.

status: complete

tasks:
  - phase: 1
    name: Fix Dockerfiles
    status: done
    items:
      - done: true
        action: Add `RUN apk add --no-cache tzdata` to apps/guernsey-scraper/Dockerfile (production stage, before ENV)
      - done: true
        action: Add `RUN apk add --no-cache tzdata` to apps/web/Dockerfile (production stage, before ENV)
      - done: true
        action: Verify the fr24-scraper Dockerfile already has tzdata (it does via apt-get) — no changes needed

  - phase: 2
    name: Data Fix Migration
    status: done
    items:
      - done: true
        action: Write SQL migration NNNN_fix_bst_scheduled_times.sql that adds 1 hour to scheduled_departure/scheduled_arrival for BST-date flights where the value appears to be stored as-if-UTC (reverse of migration 0014 logic)
      - done: true
        action: Add the migration to the Drizzle migrations directory with proper meta files
      - done: true
        action: Test the migration on a staging/development database with sample BST-date flight data

  - phase: 3
    name: Regression Test
    status: done
    items:
