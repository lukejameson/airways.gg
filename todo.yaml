# todo.yaml — single source of truth for LLM
# Updated: 2026-06-02T16:00:00Z

goal: >
  Address 23 UI/UX issues identified in the airways.gg code review —
  4 high, 12 medium, 7 low — covering dark mode, accessibility, stats page
  UX, search, navigation, and polish.

why_how: >
  A top-down UI/UX audit of the airways.gg SvelteKit 5 web app found the
  site well-crafted but with concrete gaps: no dark mode, no reduced-motion
  support, an overwhelming stats page, missing search autocomplete, and
  various interaction polish issues. Each task targets a specific finding
  from code-review-report.md with clear, independently verifiable actions.
  Prioritized by severity — high items first, then medium, then low.

expected: >
  The site gains dark mode with a theme toggle, respects prefers-reduced-motion,
  has a streamlined stats page with TOC and simplified route filter, adds
  search autocomplete, improves flight detail navigation with breadcrumbs
  and section jump links, adds aria-live regions, shows weather on mobile
  cards, adds chart loading skeletons, and addresses all remaining medium/low
  items. Total: ~23 actionable changes across 11 files.

status: pending

