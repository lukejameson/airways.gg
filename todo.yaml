goal: >
  Add timezone drift monitoring that periodically checks localToUtc offset
  correctness and alerts via Telegram if the offset ever drifts.

why_how: >
  The timezone fix replaced Luxon with native Intl, but there's no guard to
  detect if Intl's Europe/London resolution ever breaks again (e.g., after
  a Node.js upgrade, ICU data change, or container image change). Adding a
  periodic check in the guernsey scraper live loop with a Telegram alert
  will catch any future regression within minutes.

expected: >
  When the scraper is running during BST, it verifies every 30 minutes that
  localToUtc produces the correct UTC offset. If the offset is wrong (0
  instead of 1 during BST, or vice versa in GMT), a Telegram alert fires
  with the detected vs expected offset values. Users won't need to manually
  spot broken times.

status: complete

