# Updated: 2026-06-13T17:30:00Z
# Context: research-brief.md — Flight Detail Page Time Display Bugs

goal: >
  Fix three bugs causing incorrect and inconsistent departure times on the
  flight detail page: a timezone omission in FlightTimeline display, missing
  estimated-time rendering in Flight Details, and the guernsey-scraper
  mis-extracting check-in opening times as the estimated departure.

why_how: >
  Flight GR308 (id=42485) displays 16:45 in some page sections and 15:45 in
  others, when the correct ETD should be 18:30. Three distinct bugs cause this:
  (1) FlightTimeline.svelte's local formatTime uses toLocaleTimeString without
  timeZone: 'Europe/London', showing raw UTC values during BST. (2) The Flight
  Details section in +page.svelte always shows flight.scheduledDeparture even
  when flight_times has a better EstimatedBlockOff. (3) The guernsey-scraper's
  extractEstimatedTime picks the first HH:MM from "Check In Open 16:00 Closes
  19:00" instead of the actual ETD "18:30" from an older "New ETD" message.
  All fixes are localized and low-risk. Using research-brief.md as context.

expected: >
  - FlightTimeline and Flight Details both display Guernsey local time
    consistently across the entire page (BST in summer, GMT in winter).
  - When an EstimatedBlockOff or EstimatedBlockOn exists in flight_times,
    the Flight Details section shows that estimate instead of the scheduled
    time.
  - The guernsey-scraper no longer writes check-in open/close times as the
    estimated departure; it prefers "New ETD" and "Delayed To" times.
  - Flight GR308 re-scrapes correctly and shows ETD 18:30 instead of 16:45.

status: complete

