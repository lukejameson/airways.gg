      - done: true
        action: Add a round-trip test: localToUtc → store in DB → read back → formatGuernseyTime should produce the original local time
      - done: true
        action: Run full test suite and verify all tests pass

  - phase: 4
    name: Deploy & Verify
    status: done
    items:
      - done: true
        action: Deploy updated Docker images to production
      - done: true
        action: Run the data fix migration in production
      - done: true
        action: Verify GR634 and a sample of other flights show correct scheduled times on the live site

notes:
  - tzdata is already installed in fr24-scraper (via apt-get tzdata in the slim image) — only guernsey-scraper and web need the fix
  - The SQL migration must only affect flights where scheduled_departure is stored as-if-UTC (1 hour ahead of true UTC). Use the same BST date predicate from migration 0014: `(flight_date || ' 12:00:00')::timestamp AT TIME ZONE 'Europe/London' != (flight_date || ' 12:00:00')::timestamp AT TIME ZONE 'UTC'`
  - Unlike migration 0014 which SUBTRACTED 1 hour (wall-clock → UTC), this migration must ADD 1 hour (as-if-UTC → true UTC)
  - Only scheduled_departure and scheduled_arrival need correction; actual_departure/actual_arrival come from status message timestamps which are timestamped by the scraper at scrape time, not via localToUtc
  - The formatGuernseyTime display layer uses native Intl which already works correctly — no changes needed there

